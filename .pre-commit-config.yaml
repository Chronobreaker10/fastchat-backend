repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Используйте актуальную версию ruff. Можно посмотреть на https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      # Запускаем линтер и автоматически исправляем ошибки
      - id: ruff
        args: [--fix]
      # Запускаем форматтер
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']
