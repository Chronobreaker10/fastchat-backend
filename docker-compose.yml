services:
  fastapi:
    build: .
    container_name: fastchat_service
    restart: always
    env_file:
      - .env.docker
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition : service_healthy
    ports:
      - "8000:8000"

  postgres:
    image: postgres:18-alpine
    container_name: fastchat_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
